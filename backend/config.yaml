# JARVIS Configuration File
# Phase 1: Core Configuration

jarvis:
  name: "Illo"
  version: "1.0.0"
  description: "Illo Juan AI Assistant"
  wake_word: "illo"

  # Voice Configuration
  voice:
    engine: pyttsx3
    rate: 150
    volume: 0.8
    language: en
    wake_detection:
      enabled: true
      wake_words:
        - illo
      listen_timeout: 4
      phrase_time_limit: 6
      poll_delay: 0.2

  # NLU Configuration
  nlu:
    confidence_threshold: 0.7
    max_context_history: 10

  # API Configuration
  api:
    timeout: 5
    max_retries: 3
    retry_delay: 1

  # Storage Configuration
  storage:
    conversation_db: "data/conversations.db"
    device_state_file: "data/devices.json"
    automation_rules_file: "data/automations.json"
    custom_skills_dir: "../custom_skills"
    preferences_file: "data/preferences.json"

  # Automation Configuration
  automation:
    background_enabled: true
    poll_interval: 1.0

  # Brain Configuration
  brain:
  default_provider: openrouter
  openrouter_api_key: ""
  openrouter_model: "openai/gpt-4o-mini"
  routing:
    default: openrouter
    smart_home: legacy_core

  # Security Configuration
  security:
    require_explicit_approval: true
    approval_prefix: "approve:"
    audit_log_file: "logs/audit.log"
    sandbox:
      allowed_dirs:
        - "C:\\Proyectos"
      timeout: 60

  # Orchestrator Configuration
  orchestrator:
    enabled: true
    safety:
      require_explicit_approval: true
      disclose_limitations: true
      privileged_keywords:
        - reset password
        - delete account
        - close account
        - transfer funds
        - purchase
        - pair device
        - firmware update
        - factory reset
        - send text
        - send message
        - call
        - dial
        - unlock phone

# Logging Configuration
logging:
  level: DEBUG
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
  file: "logs/jarvis.log"
  max_size_mb: 10
  backup_count: 5

# Skills Configuration
skills:
  enabled:
    - greeting
    - time
    - smart_home
    - calculator
    - weather
    - news
    - orchestrator

  greeting:
    enabled: true

  time:
    enabled: true
    timezone: America/Bogota

  smart_home:
    enabled: true
    auto_save_state: true

  calculator:
    enabled: true

  weather:
    enabled: true
    default_location: bogota

  news:
    enabled: true
    source: hacker_news

  orchestrator:
    enabled: true

# Development Settings
development:
  debug: true
  reload_on_change: true
  mock_api_responses: false